# Quality of Life Improvements for Hyprland
# Source this in your hyprland.conf: source = ~/.config/hypr/qol-improvements.conf

# Better window focus behavior
misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_autoreload = false
    vrr = 1
}

# Fix cursor visibility issues
cursor {
    no_hardware_cursors = true
    hide_on_key_press = false
}


# Better window rules for common applications
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(1Password)$
windowrulev2 = center, class:^(1Password)$

# Better handling for dialog windows
windowrulev2 = float, class:^(.*),title:^(Open File)$
windowrulev2 = float, class:^(.*),title:^(Save File)$
windowrulev2 = float, class:^(.*),title:^(Confirm)$

# Improve Firefox popup handling
windowrulev2 = float, class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = pin, class:^(firefox)$,title:^(Picture-in-Picture)$
windowrulev2 = size 640 360, class:^(firefox)$,title:^(Picture-in-Picture)$

# Better screen sharing support
windowrulev2 = float, title:^(.*is sharing your screen)$
windowrulev2 = move 50% 50%, title:^(.*is sharing your screen)$
