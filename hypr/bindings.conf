# Application shortcuts (Omarchy v2 style uses SHIFT for most apps)
$terminal = uwsm app -- $TERMINAL
$browser = omadora-launch-browser

bindd = SUPER, return, Terminal, exec, $terminal --working-directory="$(omadora-cmd-terminal-cwd)"
bindd = SUPER SHIFT, return, Terminal, exec, $terminal
bindd = SUPER SHIFT, F, File Explorer, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT, N, Neovim, exec, $terminal -e nvim
bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop

# Universal Clipboard (Omarchy's signature feature)
unbind = SUPER, v
unbind = SUPER, V

# Changed --tddrim-newline to --trim-newline
bindd = SUPER, C, Universal copy, exec, wl-copy --primary --trim-newline
# Removed the trailing backtick and added shell wrapping for safety
bindd = SUPER, V, Universal paste, exec, sh -c 'wl-paste | wtype -'

# Window Management (The Omarchy "Manage" layer)
bindd = SUPER, W, Close active window, killactive,
bindd = SUPER, T, Toggle floating, togglefloating,
bindd = SUPER, S, Toggle split, togglesplit,
# Swapped: Super+F now does Fullwindow, Super+Alt+F does Fullscreen
bindd = SUPER, F, Toggle fullwindow, fullscreen, 1
bindd = SUPER ALT, F, Toggle fullscreen, fullscreen, 0
# Navigation (Vim-style focus)
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, L, Move focus right, movefocus, r
#bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, J, Move focus down, movefocus, d

# Window Swappin, g
bindd = SUPER SHIFT, H, Swap window left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# System Menu & Keybindings
bindd = SUPER ALT, space, Omarchy Menu, exec, omadora-menu
# Change the menu to a different key
bindd = SUPER, SLASH, Show key bindings, exec, ~/.local/share/omadora/bin/omadora-menu-keybindings
##extra
# Screen recordings
bindd = ALT, Right_Alt, Screen record a region, exec, omadora-cmd-screenrecord region
bindd = ALT SHIFT, Right_Alt, Screen record a region with audio, exec, omadora-cmd-screenrecord region audio
bindd = CTRL ALT, Right_Alt, Screen record display, exec, omadora-cmd-screenrecord output
bindd = CTRL ALT SHIFT, Right_Alt, Screen record display with audio, exec, omadora-cmd-screenrecord output audio

