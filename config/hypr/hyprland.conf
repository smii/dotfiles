# ─── Main Hyprland Config ────────────────────────────────────────────────────
# Entry point — sources all sub-modules in order.

source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/apps/apps.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/bindings.conf

# Machine-specific overrides (generated by install.sh, not tracked in git).
# Contains: NVIDIA env vars, monitor config, laptop/desktop input tweaks.
source = ~/.config/hypr/machine.conf
