# ─── Window Rules ────────────────────────────────────────────────────────────

# Suppress accidental maximize requests
windowrule = suppress_event maximize, match:class .*

# Tag all windows for default opacity (apps.conf can remove this tag)
windowrule = tag +default-opacity, match:class .*

# XWayland null-class windows — prevent accidental focus steal
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ── Floating window tag ───────────────────────────────────────────────────────
windowrule = float on,  match:tag floating-window
windowrule = center on, match:tag floating-window
windowrule = size 875 600, match:tag floating-window

windowrule = tag +floating-window, match:class (com.gabm.satty|swayimg|mpv)
windowrule = tag +floating-window, match:class (pcmanfm|Pcmanfm), match:title ^(Open.*|Save.*|Choose.*)
windowrule = float on, match:class qalculate-gtk

# Keybinding overview
windowrule = float on,     match:title ^(Keybindings)$
windowrule = size 920 680, match:title ^(Keybindings)$
windowrule = center on,    match:title ^(Keybindings)$

# ── App workspace assignments ─────────────────────────────────────────────────
# Browser always on workspace 1
windowrule = workspace 1, match:class ^(chromium)$

# Signal: floating, centred, 85% screen (mirrors smii pattern for messaging)
windowrule = float on,     match:class ^(Signal|signal)$
windowrule = size 85% 85%, match:class ^(Signal|signal)$
windowrule = center on,    match:class ^(Signal|signal)$

# ── Special workspace auto-launch ─────────────────────────────────────────────
workspace = special:scratchpad, on-created-empty: ghostty
workspace = special:gemini,     on-created-empty: chromium --app=https://gemini.google.com
workspace = special:messages,   on-created-empty: signal-desktop
workspace = special:gmail,      on-created-empty: chromium --app=https://mail.google.com
workspace = special:calendar,   on-created-empty: chromium --app=https://calendar.google.com

# ── Opacity ───────────────────────────────────────────────────────────────────
# Apply after apps have had chance to opt out via tag -default-opacity
windowrule = opacity 0.97 0.9, match:tag default-opacity

# No transparency on media
windowrule = tag -default-opacity, match:class ^(vlc|mpv|swayimg|com.github.PintaProject.Pinta|org.gnome.NautilusPreviewer)$
windowrule = opacity 1 1,         match:class ^(vlc|mpv|swayimg|com.github.PintaProject.Pinta|org.gnome.NautilusPreviewer)$

# ── Other rules ───────────────────────────────────────────────────────────────
# Rounded corners on popped windows
windowrule = rounding 8, match:tag pop

# App-specific tweaks loaded from apps/
source = ~/.config/hypr/apps/apps.conf
