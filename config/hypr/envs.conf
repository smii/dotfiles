# ─── Environment Variables ───────────────────────────────────────────────────

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force Wayland on all toolkits
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# GTK theme — applied to blueman, pcmanfm, nm-applet and any GTK3/4 app
# Requires AUR: tokyonight-gtk-theme-git
env = GTK_THEME,Tokyonight-Dark

# NVIDIA — needed for proper Wayland rendering
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct

# XCompose support
env = XCOMPOSEFILE,~/.XCompose

# Application shortcuts used in bindings
env = TERMINAL,ghostty
env = FILE_MANAGER,pcmanfm
env = BROWSER,firefox
env = EDITOR,nvim

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
}
