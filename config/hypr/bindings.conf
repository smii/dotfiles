# ─── Key Bindings ────────────────────────────────────────────────────────────
# Scripts live in ~/.local/bin/ (installed by install.sh from scripts/).
# App launcher pattern: SUPER+SHIFT+{letter} for apps (omarchy style).

# ── App launchers ─────────────────────────────────────────────────────────────
bindd = SUPER, RETURN,              Open terminal,            exec, ghostty
bindd = SUPER ALT, RETURN,          Open tmux,                exec, ghostty -e tmux
bindd = SUPER SHIFT, RETURN,        Open browser,             exec, chromium --profile-directory=personal
bindd = SUPER SHIFT, F,             Open file manager,        exec, pcmanfm
bindd = SUPER SHIFT, N,             Open Neovim,              exec, ghostty -e nvim
bindd = SUPER SHIFT, O,             Open Obsidian,            exec, obsidian
bindd = SUPER SHIFT, G,             Open Signal,              exec, signal-desktop
bindd = SUPER SHIFT, D,             Open Docker UI,           exec, ghostty -e lazydocker
bindd = SUPER SHIFT, T,             Open activity monitor,    exec, ghostty -e btop
bindd = SUPER SHIFT, SLASH,         Password manager,         exec, bitwarden-desktop
bindd = SUPER, SPACE,               Launch app runner,        exec, walker
bindd = SUPER CTRL, E,              Emoji picker,             exec, walker -m symbols
bindd = , XF86Calculator,           Calculator,               exec, qalculate-gtk

# ── System shortcuts ──────────────────────────────────────────────────────────
bindd = SUPER CTRL, L,              Lock screen,              exec, hyprlock
bindd = SUPER, ESCAPE,              Power menu,               exec, wlogout -b 3 -T 240 -B 240 -L 350 -R 350
bindd = , XF86PowerOff,             Power menu,               exec, wlogout -b 3 -T 240 -B 240 -L 350 -R 350

# ── Help ──────────────────────────────────────────────────────────────────────
bindd = SUPER CTRL, K,              Keybinding overview,      exec, ~/.local/bin/keybindings

# ── Aesthetics ────────────────────────────────────────────────────────────────
bindd = SUPER SHIFT, SPACE,         Toggle top bar,           exec, pkill waybar || waybar &
bindd = SUPER, BACKSPACE,           Toggle transparency,      exec, ~/.local/bin/window-transparency-toggle
bindd = SUPER SHIFT, BACKSPACE,     Toggle window gaps,       exec, ~/.local/bin/window-gaps-toggle
bindd = SUPER, PRINT,               Color picker,             exec, pkill hyprpicker || hyprpicker -a

# ── Notifications ─────────────────────────────────────────────────────────────
bindd = SUPER, COMMA,               Dismiss notification,          exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA,         Dismiss all notifications,     exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA,          Toggle do-not-disturb,         exec, ~/.local/bin/notification-silencing-toggle
bindd = SUPER ALT, COMMA,           Invoke notification,           exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA,     Restore notification,          exec, makoctl restore

# ── Toggles ───────────────────────────────────────────────────────────────────
bindd = SUPER CTRL, I,              Toggle idle lock,              exec, ~/.local/bin/idle-toggle
bindd = SUPER CTRL, N,              Toggle night light,            exec, ~/.local/bin/nightlight-toggle

# ── Screen capture ────────────────────────────────────────────────────────────
bindd = , PRINT,                    Screenshot region,             exec, ~/.local/bin/screenshot
bindd = SUPER SHIFT, S,             Screenshot region,             exec, ~/.local/bin/screenshot
bindd = ALT, PRINT,                 Screen recording toggle,       exec, ~/.local/bin/screenrecord-toggle
bindd = SUPER CTRL, PRINT,          Extract text (OCR),            exec, hyprshot -m region -o /tmp/ocr.png && tesseract /tmp/ocr.png stdout | wl-copy

# ── Controls ──────────────────────────────────────────────────────────────────
bindd = SUPER CTRL, A,              Audio controls,                exec, pavucontrol
bindd = SUPER CTRL, B,              Bluetooth controls,            exec, ghostty -e bluetui
bindd = ALT CTRL, W,                Wi-Fi controls,                exec, ghostty -e nmtui
bindd = SUPER, XF86AudioMute,       Switch audio out,              exec, ~/.local/bin/audio-switch

# ── Zoom ──────────────────────────────────────────────────────────────────────
bindd = SUPER CTRL, Z,              Zoom in,                       exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z,          Reset zoom,                    exec, hyprctl keyword cursor:zoom_factor 1

# ── Window management ─────────────────────────────────────────────────────────
bindd = SUPER, W,                   Close window,                  killactive
bindd = CTRL ALT, DELETE,           Close all windows,             exec, hyprctl dispatch killactive

bindd = SUPER, J,                   Toggle window split,           layoutmsg, togglesplit
bindd = SUPER, P,                   Pseudo window,                 pseudo
bindd = SUPER, T,                   Toggle float/tile,             togglefloating
bindd = SUPER, fullscreen,          Full screen,                   fullscreen, 0
bindd = SUPER CTRL, F,              Tiled full screen,             fullscreenstate, 0 2
bindd = SUPER ALT, F,               Full width,                    fullscreen, 1
bindd = SUPER, G,                   Toggle window group,           togglegroup
bindd = SUPER ALT, G,               Move out of group,             moveoutofgroup

# Pop window (float + pin)
bindd = SUPER, O,                   Pop window out,                exec, hyprctl dispatch togglefloating && hyprctl dispatch pin

# Focus
bindd = SUPER, LEFT,                Focus left,                    movefocus, l
bindd = SUPER, RIGHT,               Focus right,                   movefocus, r
bindd = SUPER, UP,                  Focus up,                      movefocus, u
bindd = SUPER, DOWN,                Focus down,                    movefocus, d

# Swap windows
bindd = SUPER SHIFT, LEFT,          Swap left,                     swapwindow, l
bindd = SUPER SHIFT, RIGHT,         Swap right,                    swapwindow, r
bindd = SUPER SHIFT, UP,            Swap up,                       swapwindow, u
bindd = SUPER SHIFT, DOWN,          Swap down,                     swapwindow, d

# Resize
bindd = SUPER, code:20,             Expand left,                   resizeactive, -100 0
bindd = SUPER, code:21,             Shrink left,                   resizeactive, 100 0
bindd = SUPER SHIFT, code:20,       Shrink up,                     resizeactive, 0 -100
bindd = SUPER SHIFT, code:21,       Expand down,                   resizeactive, 0 100

# ── Workspaces ────────────────────────────────────────────────────────────────
bindd = SUPER, code:10,             Workspace 1,                   workspace, 1
bindd = SUPER, code:11,             Workspace 2,                   workspace, 2
bindd = SUPER, code:12,             Workspace 3,                   workspace, 3
bindd = SUPER, code:13,             Workspace 4,                   workspace, 4
bindd = SUPER, code:14,             Workspace 5,                   workspace, 5
bindd = SUPER, code:15,             Workspace 6,                   workspace, 6
bindd = SUPER, code:16,             Workspace 7,                   workspace, 7
bindd = SUPER, code:17,             Workspace 8,                   workspace, 8
bindd = SUPER, code:18,             Workspace 9,                   workspace, 9
bindd = SUPER, code:19,             Workspace 10,                  workspace, 10

bindd = SUPER SHIFT, code:10,       Move to workspace 1,           movetoworkspace, 1
bindd = SUPER SHIFT, code:11,       Move to workspace 2,           movetoworkspace, 2
bindd = SUPER SHIFT, code:12,       Move to workspace 3,           movetoworkspace, 3
bindd = SUPER SHIFT, code:13,       Move to workspace 4,           movetoworkspace, 4
bindd = SUPER SHIFT, code:14,       Move to workspace 5,           movetoworkspace, 5
bindd = SUPER SHIFT, code:15,       Move to workspace 6,           movetoworkspace, 6
bindd = SUPER SHIFT, code:16,       Move to workspace 7,           movetoworkspace, 7
bindd = SUPER SHIFT, code:17,       Move to workspace 8,           movetoworkspace, 8
bindd = SUPER SHIFT, code:18,       Move to workspace 9,           movetoworkspace, 9
bindd = SUPER SHIFT, code:19,       Move to workspace 10,          movetoworkspace, 10

bindd = SUPER SHIFT ALT, code:10,   Move silently to workspace 1,  movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, code:11,   Move silently to workspace 2,  movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, code:12,   Move silently to workspace 3,  movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, code:13,   Move silently to workspace 4,  movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, code:14,   Move silently to workspace 5,  movetoworkspacesilent, 5

bindd = SUPER, TAB,                 Next workspace,                workspace, e+1
bindd = SUPER SHIFT, TAB,           Prev workspace,                workspace, e-1
bindd = SUPER CTRL, TAB,            Former workspace,              workspace, previous

bindd = SUPER, S,                   Toggle scratchpad,             togglespecialworkspace, scratchpad
bindd = SUPER ALT, S,               Move to scratchpad,            movetoworkspacesilent, special:scratchpad

# ── Special / scratchpad workspaces ───────────────────────────────────────────
bindd = SUPER, A,                   Toggle AI (Gemini),            togglespecialworkspace, gemini
bindd = SUPER ALT, A,               Move to Gemini workspace,      movetoworkspacesilent, special:gemini
bindd = SUPER, M,                   Toggle Messages (Signal),      togglespecialworkspace, messages
bindd = SUPER ALT, M,               Move to Messages workspace,    movetoworkspacesilent, special:messages
bindd = SUPER, E,                   Toggle Gmail,                  togglespecialworkspace, gmail
bindd = SUPER ALT, E,               Move to Gmail workspace,       movetoworkspacesilent, special:gmail
bindd = SUPER SHIFT, E,             Toggle Calendar,               togglespecialworkspace, calendar
bindd = SUPER SHIFT ALT, E,         Move to Calendar workspace,    movetoworkspacesilent, special:calendar

# Move workspaces between monitors
bindd = SUPER SHIFT ALT, LEFT,      Move workspace left,           movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT,     Move workspace right,          movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP,        Move workspace up,             movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN,      Move workspace down,           movecurrentworkspacetomonitor, d

# Monitor focus
bindd = CTRL ALT, TAB,              Next monitor,                  focusmonitor, +1
bindd = CTRL ALT SHIFT, TAB,        Prev monitor,                  focusmonitor, -1

# Window switching via Walker (excludes scratchpad workspaces)
bindd = ALT, TAB,                   Switch windows,                exec, ~/.local/bin/window-switcher

# Groups
bindd = SUPER ALT, LEFT,            Group: move left,              moveintogroup, l
bindd = SUPER ALT, RIGHT,           Group: move right,             moveintogroup, r
bindd = SUPER ALT, UP,              Group: move up,                moveintogroup, u
bindd = SUPER ALT, DOWN,            Group: move down,              moveintogroup, d
bindd = SUPER ALT, TAB,             Group: next,                   changegroupactive, f
bindd = SUPER ALT SHIFT, TAB,       Group: prev,                   changegroupactive, b

# Mouse
bindmd = SUPER, mouse:272,          Move window,                   movewindow
bindmd = SUPER, mouse:273,          Resize window,                 resizewindow
bindd  = SUPER, mouse_down,         Next workspace,                workspace, e+1
bindd  = SUPER, mouse_up,           Prev workspace,                workspace, e-1

# ── Media keys ────────────────────────────────────────────────────────────────
bindeld = , XF86AudioRaiseVolume,   Volume up,           exec, swayosd-client --output-volume raise
bindeld = , XF86AudioLowerVolume,   Volume down,         exec, swayosd-client --output-volume lower
bindeld = , XF86AudioMute,          Mute,                exec, swayosd-client --output-volume mute-toggle
bindeld = , XF86AudioMicMute,       Mute mic,            exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindeld = ALT, XF86AudioRaiseVolume, Volume +1,          exec, swayosd-client --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume -1,          exec, swayosd-client --output-volume -1

bindld = , XF86AudioNext,           Next track,          exec, swayosd-client --playerctl next
bindld = , XF86AudioPause,          Pause,               exec, swayosd-client --playerctl play-pause
bindld = , XF86AudioPlay,           Play,                exec, swayosd-client --playerctl play-pause
bindld = , XF86AudioPrev,           Prev track,          exec, swayosd-client --playerctl previous
