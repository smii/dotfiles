# ─── Look & Feel ─────────────────────────────────────────────────────────────
# TokyoNight colour palette

$accent          = rgba(7aa2f7ee)
$accentGrad      = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
$inactive        = rgba(595959aa)

general {
    gaps_in  = 5
    gaps_out = 10

    border_size = 2

    col.active_border   = $accentGrad
    col.inactive_border = $inactive

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled      = true
        range        = 2
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled    = true
        size       = 2
        passes     = 2
        special    = true
        brightness = 0.60
        contrast   = 0.75
    }
}

group {
    col.border_active          = $accentGrad
    col.border_inactive        = $inactive
    col.border_locked_active   = $accentGrad
    col.border_locked_inactive = $inactive

    groupbar {
        font_size             = 12
        font_family           = monospace
        font_weight_active    = ultraheavy
        font_weight_inactive  = normal

        indicator_height = 0
        indicator_gap    = 5
        height           = 22
        gaps_in          = 5
        gaps_out         = 0

        text_color          = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active          = rgba(00000040)
        col.inactive        = rgba(00000020)

        gradients              = true
        gradient_rounding      = 0
        gradient_round_only_edges = false
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global,           1, 10, default
    animation = border,           1,  5, easeOutQuint
    animation = windows,          1,  4, easeOutQuint
    animation = windowsIn,        1,  4, easeOutQuint, popin 87%
    animation = windowsOut,       1,  2, linear,       popin 87%
    animation = fadeIn,           1,  2, almostLinear
    animation = fadeOut,          1,  2, almostLinear
    animation = fade,             1,  3, quick
    animation = layers,           1,  4, easeOutQuint
    animation = layersIn,         1,  4, easeOutQuint, fade
    animation = layersOut,        1,  2, linear,       fade
    animation = fadeLayersIn,     1,  2, almostLinear
    animation = fadeLayersOut,    1,  2, almostLinear
    animation = workspaces,       0,  0, ease
    animation = specialWorkspace, 1,  3, easeOutQuint, slidevert
}

dwindle {
    preserve_split = true
    force_split    = 2
}

scrolling {
    column_width = 0.49
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate        = true
    anr_missed_pings         = 3
    on_focus_under_fullscreen = 1
}

cursor {
    hide_on_key_press       = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}
