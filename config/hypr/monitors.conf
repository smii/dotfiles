# ─── Monitor Configuration ───────────────────────────────────────────────────
# ROG Crosshair VIII Impact + RTX 3080 — dual landscape monitors side by side.
#
# Adjust connector names with: hyprctl monitors all
# Common GPU outputs: DP-1, DP-2, DP-3, HDMI-A-1
#
# Format: monitor = NAME, RESOLUTION@HZ, POSITION, SCALE
#   Position is pixel offset from (0,0). Place second monitor to the right.

monitor = DP-1, preferred, 0x0, 1
monitor = DP-2, preferred, auto-right, 1

# Fallback — any unknown monitor gets a sane default
monitor = ,preferred,auto,1

# Workspace assignments (adjust numbers to preference)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-2, default:true
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2
