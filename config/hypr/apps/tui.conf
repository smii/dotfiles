# ─── Floating TUI Apps ────────────────────────────────────────────────────────
# Launched via ghostty --class=tui.<name> -e <app>

windowrule = float on,  match:class ^(tui.btop|tui.lazydocker|tui.nmtui|tui.bluetui|tui.float)$
windowrule = center on, match:class ^(tui.btop|tui.lazydocker|tui.nmtui|tui.bluetui|tui.float)$

windowrule = size 1060 640, match:class ^(tui.btop)$
windowrule = size 860 520, match:class ^(tui.lazydocker)$
windowrule = size 760 460, match:class ^(tui.nmtui)$
windowrule = size 760 460, match:class ^(tui.bluetui)$
windowrule = size 860 520, match:class ^(tui.float)$
