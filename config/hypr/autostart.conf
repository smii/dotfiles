# ─── Autostart ───────────────────────────────────────────────────────────────
# With UWSM, all daemons (waybar, mako, hypridle, swayosd, swaybg,
# hyprpolkitagent) start automatically via systemd/user/ services.
# Only put here what must run inside the Hyprland compositor context.

# Propagate env vars to systemd + dbus so services get WAYLAND_DISPLAY etc.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all

# Input method (no stable systemd socket activation for fcitx5 yet)
exec-once = fcitx5 --disable notificationitem
