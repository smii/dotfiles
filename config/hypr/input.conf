# ─── Input ───────────────────────────────────────────────────────────────────

input {
    kb_layout          = us
    kb_variant         =
    kb_model           =
    kb_options         = compose:caps
    kb_rules           =
    numlock_by_default = true
    repeat_rate        = 40
    repeat_delay       = 250

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = false
        clickfinger_behavior = true
        scroll_factor     = 0.4
    }
}

# Per-app scroll speed (terminals feel snappy, ghostty is already fast)
device {
    name          = ".*alacritty.*"
    scroll_factor = 1.5
}

misc {
    key_press_enables_dpms  = true
    mouse_move_enables_dpms = true
}
