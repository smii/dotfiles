# ─── hyprlock — TokyoNight ───────────────────────────────────────────────────

background {
    monitor     =
    color       = rgb(1a1b26)
    blur_passes = 2
    blur_size   = 4
}

label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    color       = rgb(a9b1d6)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font
    position    = 0, 160
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color       = rgba(a9b1d6cc)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, 60
    halign      = center
    valign      = center
}

input-field {
    monitor           =
    size              = 350, 50
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.2
    outer_color       = rgb(7aa2f7)
    inner_color       = rgb(24283b)
    font_color        = rgb(a9b1d6)
    fade_on_empty     = true
    placeholder_text  = <span foreground="##a9b1d6"><i>Password...</i></span>
    check_color       = rgb(7aa2f7)
    fail_color        = rgb(f7768e)
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position          = 0, -120
    halign            = center
    valign            = center
}
